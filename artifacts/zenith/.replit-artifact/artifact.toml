kind = "web"
previewPath = "/"
title = "Zenith Genesis Campaign"
version = "1.0.0"
id = "artifacts/zenith"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22192

[services.development]
run = "pnpm --filter @workspace/zenith run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zenith", "run", "build" ]
publicDir = "artifacts/zenith/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22192"
BASE_PATH = "/"
